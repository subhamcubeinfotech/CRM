<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Wholesale Account - Urban Poling</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg-gradient: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            color: #1f2937;
        }

        .request-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .card-header {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            padding: 40px;
            text-align: center;
            color: white;
            border: none;
        }

        .card-header i {
            font-size: 3rem;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        .card-header h1 {
            font-size: 24px;
            font-weight: 800;
            margin: 0;
            letter-spacing: -0.025em;
        }

        .card-header p {
            margin: 10px 0 0;
            opacity: 0.9;
            font-size: 15px;
        }

        .card-body {
            padding: 40px;
        }

        .form-section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6b7280;
            margin: 24px 0 16px;
            display: flex;
            align-items: center;
        }

        .form-section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #e5e7eb;
            margin-left: 15px;
        }

        .form-label {
            font-weight: 600;
            font-size: 14px;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 10px;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            transition: all 0.2s ease;
            font-size: 15px;
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            border: none;
            border-radius: 12px;
            padding: 16px;
            font-weight: 700;
            color: white;
            width: 100%;
            margin-top: 32px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.3);
            filter: brightness(1.05);
        }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }

        .back-link a {
            color: #6b7280;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: var(--primary);
        }

        .input-group-text {
            background-color: #f9fafb;
            border: 2px solid #e5e7eb;
            border-right: none;
            color: #9ca3af;
        }

        .form-control.with-icon {
            border-left: none;
        }
    </style>
</head>

<body>
    <div class="request-card">
        <div class="card-header">
            <i class="fas fa-building-circle-check"></i>
            <h1>Wholesale Onboarding</h1>
            <p>Ready to join the Urban Poling wholesale network?</p>
        </div>
        <div class="card-body">
            {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{{ message.tags }} rounded-4 mb-4">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="form-section-title">Business Details</div>

                <div class="mb-3">
                    <label class="form-label">Company Name</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-briefcase"></i></span>
                        <input type="text" name="company_name" class="form-control with-icon"
                            placeholder="e.g. Urban Sports Ltd." required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Business Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="fas fa-location-dot"></i></span>
                        <textarea name="business_address" class="form-control with-icon" rows="2"
                            placeholder="Full street address, city, and province" required></textarea>
                    </div>
                </div>

                <div class="form-section-title">Contact Information</div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Contact Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                            <input type="text" name="contact_name" class="form-control with-icon"
                                placeholder="First & Last Name" value="{% if user.is_authenticated %}{{ user.get_full_name }}{% endif %}" required>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Business Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                            <input type="email" name="contact_email" class="form-control with-icon"
                                placeholder="name@company.com" value="{% if user.is_authenticated %}{{ user.email }}{% endif %}" {% if user.is_authenticated %}readonly{% endif %} required>
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn btn-submit">
                    Send Request <i class="fas fa-paper-plane ms-2"></i>
                </button>
            </form>

            <div class="back-link">
                <a href="{% url 'login' %}"><i class="fas fa-arrow-left me-2"></i>Back to Sign In</a>
            </div>
        </div>
    </div>
</body>

</html>
