{% extends "marketing/base_marketing.html" %}

{% block content %}
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8 text-center">
            <div class="card shadow-lg border-0 rounded-lg p-5">
                <div class="mb-4">
                    <i class="fas fa-exclamation-circle text-warning fa-5x"></i>
                </div>
                <h1 class="display-4 font-weight-bold mb-3">Oops! Something went wrong</h1>
                <p class="lead text-muted mb-4">
                    {{ message|default:"An unexpected error occurred during the checkout process." }}
                </p>
                <div class="mt-4">
                    <a href="{% url 'signup' %}" class="btn btn-primary btn-lg px-5">
                        Try Signing Up Again
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
