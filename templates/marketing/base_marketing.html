<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FreightPro - Modern Logistics Solutions{% endblock %}</title>
    
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --secondary: #64748b;
            --dark: #0f172a;
            --light: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: var(--dark);
            background-color: white;
            overflow-x: hidden;
        }

        .navbar {
            padding: 1.5rem 0;
            transition: all 0.3s ease;
        }

        .navbar.scrolled {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 0;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--dark) !important;
        }

        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
            padding: 0.75rem 1.5rem;
            font-weight: 600;
            border-radius: 0.5rem;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
            border-color: var(--primary-dark);
        }

        footer {
            background: var(--dark);
            color: white;
            padding: 4rem 0;
        }

        .nav-link {
            font-weight: 500;
            color: var(--secondary) !important;
            margin: 0 1rem;
        }

        .nav-link:hover {
            color: var(--primary) !important;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top" id="mainNavbar">
        <div class="container">
            <a class="navbar-brand" href="{% url 'marketing:home' %}">
                <i class="fas fa-shipping-fast text-primary me-2"></i>FreightPro
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'marketing:home' %}">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'marketing:features' %}">Features</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="{% url 'marketing:pricing' %}">Pricing</a>
                    </li>
                </ul>
                <div class="d-flex align-items-center">
                    <a href="{% url 'login' %}" class="btn btn-link text-decoration-none text-dark fw-bold me-3">Login</a>
                    <a href="{% url 'marketing:pricing' %}" class="btn btn-primary">Get Started</a>
                </div>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container text-center">
            <div class="mb-4">
                <a class="navbar-brand text-white" href="#">
                    <i class="fas fa-shipping-fast me-2"></i>FreightPro
                </a>
            </div>
            <p class="text-secondary">&copy; 2026 FreightPro Logistics Technologies Inc. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        window.addEventListener('scroll', function() {
            if (window.scrollY > 50) {
                document.getElementById('mainNavbar').classList.add('scrolled');
            } else {
                document.getElementById('mainNavbar').classList.remove('scrolled');
            }
        });
    </script>
</body>
</html>
