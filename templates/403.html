{% extends 'base.html' %}

{% block title %}403 - Access Denied{% endblock %}

{% block content %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 65vh;">
    <div class="text-center">
        <div style="font-size: 5rem;">🚫</div>
        <h1 class="display-4 fw-bold text-danger mt-3">403</h1>
        <h4 class="text-muted mb-3">Access Denied</h4>
        <p class="text-muted mb-4">
            Aapke paas is record ko dekhne ki permission nahi hai.<br>
            Aap sirf apni company ka data dekh sakte hain.
        </p>
        <a href="{% url 'dashboard' %}" class="btn btn-primary px-4">
            <i class="fas fa-home me-2"></i> Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
