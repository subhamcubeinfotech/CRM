version: '3.8'

services:
  web:
    build: .
    container_name: freightpro_web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DJANGO_DEBUG=True
      - REDIS_URL=redis://redis:6379/1
    depends_on:
      - redis
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"

  redis:
    image: redis:7-alpine
    container_name: freightpro_redis
    ports:
      - "6379:6379"
