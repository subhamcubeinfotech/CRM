version: '3.8'

services:
  web:
    build: .
    container_name: freightpro_web
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DJANGO_DEBUG=True
    # The command is kept simple. We override it here to ensure migrations run
    # and to watch for changes locally because of the volume mount.
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
